# Family Tree — reverse proxy → Hono (family-tree:3000).
# Упрощённая схема по мотивам nginx.zip (локальный шаблон): gzip, заголовки, upload size.

user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /tmp/nginx.pid;

events {
  worker_connections  1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  tcp_nopush    on;
  keepalive_timeout  65;
  client_max_body_size 20m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

  upstream family_tree_app {
    server family-tree:3000;
    keepalive 16;
  }

  server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
      proxy_pass         http://family_tree_app;
      proxy_http_version 1.1;
      proxy_set_header   Host $host;
      proxy_set_header   X-Real-IP $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade $http_upgrade;
      proxy_set_header   Connection $connection_upgrade;
      proxy_read_timeout 120s;
    }
  }
}
