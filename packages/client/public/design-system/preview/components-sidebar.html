<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
<style>
body { margin: 0; padding: 0; background: var(--md-sys-color-surface-container-low); font-family: var(--md-ref-typeface-plain); }

/* Sidebar */
.sidebar {
  width: 280px; height: 260px;
  background: var(--md-sys-color-surface-container-low);
  display: flex; flex-direction: column;
  border-right: 1px solid var(--md-sys-color-outline-variant);
}
.brand { padding: 18px 16px 12px; border-bottom: 1px solid var(--md-sys-color-outline-variant); }
.brand-title { font-size: 22px; font-weight: 400; color: var(--md-sys-color-on-surface); margin: 0; }
.brand-sub { font-size: 12px; color: var(--md-sys-color-on-surface-variant); margin: 2px 0 0; }
.nav { padding: 8px; flex: 1; overflow: hidden; }
.nav-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: var(--md-sys-shape-corner-full);
  cursor: pointer; transition: background .15s;
  color: var(--md-sys-color-on-surface-variant);
}
.nav-item.active {
  background: var(--md-sys-color-secondary-container);
  color: var(--md-sys-color-on-secondary-container);
}
.nav-item:not(.active):hover { background: var(--md-sys-color-surface-container-high); }
.nav-item .material-symbols-outlined { font-size: 20px; }
.nav-item span.label { font-size: 14px; font-weight: 500; }
.divider { height: 1px; background: var(--md-sys-color-outline-variant); margin: 4px 12px; }
.section-label { font-size: 11px; font-weight: 500; color: var(--md-sys-color-on-surface-variant); letter-spacing: 0.5px; text-transform: uppercase; padding: 4px 16px 2px; }
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">
    <p class="brand-title">Family Tree</p>
    <p class="brand-sub">Family archive</p>
  </div>
  <div class="nav">
    <div class="nav-item active">
      <span class="material-symbols-outlined">account_tree</span>
      <span class="label">Tree</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">photo_library</span>
      <span class="label">Albums</span>
    </div>
    <div class="divider"></div>
    <div class="section-label">Admin</div>
    <div class="nav-item">
      <span class="material-symbols-outlined">badge</span>
      <span class="label">Persons</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">family_restroom</span>
      <span class="label">Relationships</span>
    </div>
    <div class="nav-item">
      <span class="material-symbols-outlined">settings</span>
      <span class="label">Settings</span>
    </div>
  </div>
</div>
</body>
</html>
