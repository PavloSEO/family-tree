<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
<style>
body { margin: 0; padding: 16px; background: var(--md-sys-color-background); font-family: var(--md-ref-typeface-plain); }

/* Elevated card */
.card {
  background: var(--md-sys-color-surface-container-low);
  border-radius: var(--md-sys-shape-corner-medium);
  box-shadow: var(--ft-elevation-1);
  padding: 16px;
  max-width: 320px;
}
.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.avatar { width: 48px; height: 48px; border-radius: 50%; background: var(--md-sys-color-secondary-container); display: flex; align-items: center; justify-content: center; overflow: hidden; }
.avatar img { width: 100%; height: 100%; object-fit: cover; }
.avatar .material-symbols-outlined { font-size: 28px; color: var(--md-sys-color-on-secondary-container); }
.card-name { font-size: 20px; font-weight: 400; color: var(--md-sys-color-on-surface); margin: 0; line-height: 28px; }
.card-sub  { font-size: 14px; color: var(--md-sys-color-on-surface-variant); margin: 0; margin-top: 2px; }
.divider { height: 1px; background: var(--md-sys-color-outline-variant); margin: 10px 0; }
.card-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; }
.card-row .key { font-size: 12px; font-weight: 500; color: var(--md-sys-color-on-surface-variant); }
.card-row .val { font-size: 14px; color: var(--md-sys-color-on-surface); }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--md-sys-color-secondary-container);
  color: var(--md-sys-color-on-secondary-container);
  border-radius: var(--md-sys-shape-corner-full);
  padding: 4px 12px; font-size: 13px; font-weight: 500;
}
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="avatar">
      <span class="material-symbols-outlined">person</span>
    </div>
    <div>
      <p class="card-name">Ivan Petrov</p>
      <p class="card-sub">1948 – 2022 · Male</p>
    </div>
  </div>
  <div class="divider"></div>
  <div class="card-row"><span class="key">Birth place</span><span class="val">Moscow, RU</span></div>
  <div class="card-row"><span class="key">Occupation</span><span class="val">Engineer</span></div>
  <div class="card-row"><span class="key">Country</span><span class="val">🇷🇺 RU</span></div>
  <div class="divider"></div>
  <div style="font-size:11px;font-weight:500;color:var(--md-sys-color-on-surface-variant);margin-bottom:6px;">HOBBIES</div>
  <div class="chips">
    <span class="chip">Photography</span>
    <span class="chip">Chess</span>
    <span class="chip">Fishing</span>
  </div>
</div>
</body>
</html>
