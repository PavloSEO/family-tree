<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
<style>
body { margin: 0; padding: 16px; background: var(--md-sys-color-background); font-family: var(--md-ref-typeface-plain); }
.row { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }

/* Text fields */
.field-wrap { display: flex; flex-direction: column; gap: 2px; }
.field {
  position: relative; border: 1px solid var(--md-sys-color-outline);
  border-radius: var(--md-sys-shape-corner-extra-small);
  padding: 8px 12px 6px; background: transparent; min-width: 180px;
}
.field label {
  position: absolute; top: -8px; left: 10px;
  background: var(--md-sys-color-background); padding: 0 4px;
  font-size: 12px; color: var(--md-sys-color-primary); font-weight: 500;
}
.field input {
  border: none; outline: none; font-family: var(--md-ref-typeface-plain);
  font-size: 16px; background: transparent; width: 100%;
  color: var(--md-sys-color-on-surface);
}
.field.error { border-color: var(--md-sys-color-error); }
.field.error label { color: var(--md-sys-color-error); }
.field-help { font-size: 12px; color: var(--md-sys-color-on-surface-variant); padding-left: 12px; }
.field-error { font-size: 12px; color: var(--md-sys-color-error); padding-left: 12px; }

/* Checkbox */
.check-row { display: flex; align-items: center; gap: 8px; }
.check-box {
  width: 18px; height: 18px; border: 2px solid var(--md-sys-color-outline);
  border-radius: 2px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.check-box.checked { background: var(--md-sys-color-primary); border-color: var(--md-sys-color-primary); }
.check-box.checked::after { content: ''; width: 10px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg) translateY(-1px); display: block; }

/* Select */
.select-wrap {
  position: relative; border: 1px solid var(--md-sys-color-outline);
  border-radius: var(--md-sys-shape-corner-extra-small);
  padding: 8px 36px 6px 12px; min-width: 180px;
  background: transparent;
}
.select-wrap label {
  position: absolute; top: -8px; left: 10px;
  background: var(--md-sys-color-background); padding: 0 4px;
  font-size: 12px; color: var(--md-sys-color-primary); font-weight: 500;
}
.select-wrap .value { font-size: 16px; color: var(--md-sys-color-on-surface); }
.select-wrap .arrow {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: var(--md-sys-color-on-surface-variant);
}
.arrow .material-symbols-outlined { font-size: 20px; }
</style>
</head>
<body>
<div class="row">
  <div class="field-wrap">
    <div class="field">
      <label>Login</label>
      <input type="text" value="admin" readonly>
    </div>
  </div>
  <div class="field-wrap">
    <div class="field">
      <label>Password</label>
      <input type="password" value="secret" readonly>
    </div>
  </div>
  <div class="field-wrap">
    <div class="field error">
      <label>Login</label>
      <input type="text" value="wrong_user" readonly>
    </div>
    <span class="field-error">Invalid credentials</span>
  </div>
</div>
<div class="row">
  <div class="select-wrap">
    <label>Status</label>
    <span class="value">All</span>
    <span class="arrow"><span class="material-symbols-outlined">expand_more</span></span>
  </div>
  <div class="select-wrap">
    <label>Gender</label>
    <span class="value">Male</span>
    <span class="arrow"><span class="material-symbols-outlined">expand_more</span></span>
  </div>
</div>
<div class="row" style="align-items:center; gap:20px;">
  <div class="check-row">
    <div class="check-box checked"></div>
    <span class="md-typescale-body-medium">Remember me</span>
  </div>
  <div class="check-row">
    <div class="check-box"></div>
    <span class="md-typescale-body-medium">Notify on changes</span>
  </div>
</div>
</body>
</html>
