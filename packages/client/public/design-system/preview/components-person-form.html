<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body { margin: 0; padding: 0; background: var(--md-sys-color-background); font-family: var(--md-ref-typeface-plain); }

.form-wrap { max-width: 600px; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

/* Header preview card */
.header-card {
  display: flex; align-items: center; gap: 16px;
  padding: 16px; border-radius: var(--md-sys-shape-corner-medium);
  background: var(--md-sys-color-surface-container-low);
  border: 1px solid var(--md-sys-color-outline-variant);
}
.header-avatar { width: 64px; height: 64px; border-radius: var(--md-sys-shape-corner-medium); object-fit: cover; flex-shrink: 0; background: var(--md-sys-color-surface-container-high); }
.header-name { font-size: 24px; font-weight: 400; color: var(--md-sys-color-on-surface); margin: 0 0 2px; }
.header-sub  { font-size: 12px; color: var(--md-sys-color-on-surface-variant); margin: 0; }

/* Main fields card */
.main-card {
  display: flex; flex-direction: column; gap: 16px;
  padding: 16px; border-radius: var(--md-sys-shape-corner-medium);
  background: var(--md-sys-color-surface);
  border: 1px solid var(--md-sys-color-outline-variant);
}
.fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* Outlined text field */
.field-wrap { display: flex; flex-direction: column; }
.field {
  position: relative; border: 1px solid var(--md-sys-color-outline);
  border-radius: var(--md-sys-shape-corner-extra-small);
  padding: 10px 12px 8px; background: transparent;
}
.field label {
  position: absolute; top: -9px; left: 10px;
  background: var(--md-sys-color-surface);
  padding: 0 4px; font-size: 12px;
  color: var(--md-sys-color-primary); font-weight: 500;
}
.field input, .field textarea {
  border: none; outline: none; width: 100%;
  fontFamily: var(--md-ref-typeface-plain);
  font-size: 16px; background: transparent;
  color: var(--md-sys-color-on-surface);
  font-family: inherit; resize: none;
}

/* Gender radio row */
.gender-legend { font-size: 13px; font-weight: 500; color: var(--md-sys-color-on-surface-variant); margin: 0 0 8px; }
.radio-row { display: flex; gap: 24px; }
.radio-label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--md-sys-color-on-surface); cursor: pointer; }
.radio-circle { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--md-sys-color-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.radio-circle.checked::after { content: ''; width: 10px; height: 10px; border-radius: 50%; background: var(--md-sys-color-primary); display: block; }

/* Accordion */
.accordion { border-radius: var(--md-sys-shape-corner-medium); border: 1px solid var(--md-sys-color-outline-variant); overflow: hidden; }
.accordion-header {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 12px 16px;
  background: var(--md-sys-color-surface-container-low);
  border: none; cursor: pointer; text-align: left;
  color: var(--md-sys-color-on-surface);
}
.accordion-header.open { background: var(--md-sys-color-surface-container); }
.accordion-icon { color: var(--md-sys-color-primary); display: flex; }
.accordion-title { flex: 1; font-size: 14px; font-weight: 500; color: var(--md-sys-color-on-surface); }
.accordion-chevron { color: var(--md-sys-color-on-surface-variant); display: flex; }
.accordion-panel {
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
  background: var(--md-sys-color-surface);
  border-top: 1px solid var(--md-sys-color-outline-variant);
}

/* Sticky save bar */
.save-bar {
  position: sticky; bottom: 0;
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 12px 0 16px;
  background: linear-gradient(to bottom, transparent 0%, var(--md-sys-color-background) 30%);
}
.btn-outlined { display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--md-sys-color-primary);border:1px solid var(--md-sys-color-outline);border-radius:9999px;padding:10px 24px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer; }
.btn-filled   { display:inline-flex;align-items:center;gap:8px;background:var(--md-sys-color-primary);color:var(--md-sys-color-on-primary);border:none;border-radius:9999px;padding:10px 24px;font-family:inherit;font-size:14px;font-weight:500;cursor:pointer; }

svg { flex-shrink: 0; }

/* Avatar upload overlay */
.avatar-upload-wrap { position: relative; cursor: pointer; width: 64px; height: 64px; flex-shrink: 0; }
.avatar-upload-overlay {
  position: absolute; inset: 0; border-radius: var(--md-sys-shape-corner-medium);
  background: rgba(0,0,0,.45); opacity: 0; transition: opacity .2s;
  display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff;
}
.avatar-upload-wrap:hover .avatar-upload-overlay { opacity: 1; }

/* Dropzone */
.dropzone {
  border: 2px dashed var(--md-sys-color-outline);
  border-radius: var(--md-sys-shape-corner-large);
  padding: 24px 16px; text-align: center;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; transition: border-color .2s, background .2s;
  background: transparent;
}
.dropzone:hover {
  border-color: var(--md-sys-color-primary);
  background: color-mix(in srgb, var(--md-sys-color-primary) 5%, transparent);
}
</style>
</head>
<body>
<div class="form-wrap">

  <!-- Header preview card with photo upload -->
  <div class="header-card">
    <div class="avatar-upload-wrap" title="Нажмите чтобы загрузить фото">
      <img src="../assets/placeholder-female.svg" class="header-avatar" alt="">
      <div class="avatar-upload-overlay">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="#fff"><path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.65 0-3 1.35-3 3s1.35 3 3 3 3-1.35 3-3-1.35-3-3-3z"/></svg>
        <span style="font-size:11px;font-weight:500;margin-top:2px;">Изменить</span>
      </div>
    </div>
    <div style="flex:1">
      <p class="header-name">Ольга Иванова</p>
      <p class="header-sub">Женский</p>
      <p style="margin:6px 0 0;font-size:11px;color:var(--md-sys-color-on-surface-variant);">JPG, PNG, WebP · до 10 МБ</p>
    </div>
  </div>

  <!-- Dropzone -->
  <div class="dropzone">
    <svg viewBox="0 0 24 24" width="32" height="32" fill="var(--md-sys-color-on-surface-variant)"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
    <p style="margin:8px 0 2px;font-size:14px;font-weight:500;color:var(--md-sys-color-on-surface);">Перетащите фото сюда</p>
    <p style="margin:0 0 10px;font-size:12px;color:var(--md-sys-color-on-surface-variant);">или нажмите чтобы выбрать файл</p>
    <button class="btn-outlined" style="padding:6px 16px;font-size:13px;">Выбрать файл</button>
  </div>

  <!-- Main fields card -->
  <div class="main-card">
    <div class="fields-grid">
      <div class="field-wrap">
        <div class="field">
          <label>Имя *</label>
          <input type="text" value="Ольга" readonly>
        </div>
      </div>
      <div class="field-wrap">
        <div class="field">
          <label>Фамилия *</label>
          <input type="text" value="Иванова" readonly>
        </div>
      </div>
    </div>
    <div>
      <p class="gender-legend">Пол</p>
      <div class="radio-row">
        <label class="radio-label">
          <div class="radio-circle"></div>
          Мужской
        </label>
        <label class="radio-label">
          <div class="radio-circle checked"></div>
          Женский
        </label>
      </div>
    </div>
  </div>

  <!-- Accordion: Extra name (closed) -->
  <div class="accordion">
    <button class="accordion-header">
      <span class="accordion-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      </span>
      <span class="accordion-title">Дополнительное имя</span>
      <span class="accordion-chevron">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
      </span>
    </button>
  </div>

  <!-- Accordion: Dates (open) -->
  <div class="accordion">
    <button class="accordion-header open">
      <span class="accordion-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/></svg>
      </span>
      <span class="accordion-title">Даты и места</span>
      <span class="accordion-chevron">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="transform:rotate(180deg)"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
      </span>
    </button>
    <div class="accordion-panel">
      <div class="fields-grid">
        <div class="field-wrap">
          <div class="field" style="background:var(--md-sys-color-surface)">
            <label>Дата рождения</label>
            <input type="text" value="22.07.1955" readonly>
          </div>
        </div>
        <div class="field-wrap">
          <div class="field" style="background:var(--md-sys-color-surface)">
            <label>Дата смерти</label>
            <input type="text" value="" placeholder="Не указано" readonly>
          </div>
        </div>
        <div class="field-wrap">
          <div class="field" style="background:var(--md-sys-color-surface)">
            <label>Место рождения</label>
            <input type="text" value="Ленинград" readonly>
          </div>
        </div>
        <div class="field-wrap">
          <div class="field" style="background:var(--md-sys-color-surface)">
            <label>Текущее место</label>
            <input type="text" value="Москва" readonly>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Accordion: Contacts (closed) -->
  <div class="accordion">
    <button class="accordion-header">
      <span class="accordion-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M21 8V7l-3 2-3-2v1l3 2 3-2zm1-5H2C.9 3 0 3.9 0 5v14c0 1.1.9 2 2 2h20c1.1 0 1.99-.9 1.99-2L24 5c0-1.1-.9-2-2-2zM8 6c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm6 12H2v-1c0-2 4-3.1 6-3.1s6 1.1 6 3.1v1zm8-6h-8V6h8v6z"/></svg>
      </span>
      <span class="accordion-title">Контакты</span>
      <span class="accordion-chevron">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
      </span>
    </button>
  </div>

  <!-- Accordion: About -->
  <div class="accordion">
    <button class="accordion-header">
      <span class="accordion-icon">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
      </span>
      <span class="accordion-title">О человеке</span>
      <span class="accordion-chevron">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg>
      </span>
    </button>
  </div>

  <!-- Save bar -->
  <div class="save-bar">
    <button class="btn-outlined">Отмена</button>
    <button class="btn-filled">Сохранить</button>
  </div>

</div>
</body>
</html>
