services:
  family-tree:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-tree
    # Чуть больше внутреннего таймаута graceful shutdown в serve.ts (10 с)
    stop_grace_period: 15s
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data/db:/data/db
      - ./data/photos:/data/photos
      - ./data/backups:/data/backups
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PATH: /data/db/family-tree.db
      PHOTOS_PATH: /data/photos
      BACKUPS_PATH: /data/backups
      # 1 = ежедневно в 3:00 UTC, см. docker/crontab-root и scripts/docker-backup-run.sh
      ENABLE_BACKUP_CRON: "1"
      # Без значения в .env `docker compose` не подставит секрет (нет слабого дефолта).
      # Минимум 32 символа проверяет сервер при выпуске JWT (docs/07-auth.md).
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars, openssl rand -hex 32; see .env.example)}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      RATE_LIMIT_MAX_ATTEMPTS: ${RATE_LIMIT_MAX_ATTEMPTS:-5}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES:-15}
