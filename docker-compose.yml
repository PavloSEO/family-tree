services:
  family-tree:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: family-tree
    stop_grace_period: 15s
    restart: unless-stopped
    expose:
      - "3000"
    # Порт 3000 только внутри сети compose; с хоста — через nginx (8080), чтобы не конфликтовать с локальным dev-сервером.
    volumes:
      - ./data/db:/data/db
      - ./data/photos:/data/photos
      - ./data/backups:/data/backups
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_PATH: /data/db/family-tree.db
      PHOTOS_PATH: /data/photos
      BACKUPS_PATH: /data/backups
      ENABLE_BACKUP_CRON: "1"
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (min 32 chars, openssl rand -hex 32; see .env.example)}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      RATE_LIMIT_MAX_ATTEMPTS: ${RATE_LIMIT_MAX_ATTEMPTS:-5}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES:-15}

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: family-tree-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - family-tree
